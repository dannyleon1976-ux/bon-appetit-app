name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # o la rama por la que sincronices (el panel de la captura muestra "main")

# Permisos requeridos para escribir en GitHub Pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # La carpeta generada por Vite
          branch: gh-pages # La rama donde se subirá el sitio estático
